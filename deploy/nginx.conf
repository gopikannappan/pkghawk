server {
    listen 80;
    server_name pkghawk.dev api.pkghawk.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pkghawk.dev api.pkghawk.dev;

    # Managed by Certbot — update paths after running certbot
    ssl_certificate /etc/letsencrypt/live/pkghawk.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pkghawk.dev/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # SSE / WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Disable buffering for SSE
    proxy_buffering off;
    proxy_cache off;

    # Long timeouts for SSE/WebSocket connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
