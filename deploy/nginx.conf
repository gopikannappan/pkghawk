# Add to http {} block in /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
#   limit_req_zone $binary_remote_addr zone=feed:10m rate=10r/m;

server {
    listen 80;
    server_name pkghawk.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pkghawk.dev;

    ssl_certificate /etc/letsencrypt/live/pkghawk.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pkghawk.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.pkghawk.dev; style-src 'self' 'unsafe-inline'; connect-src 'self' https://analytics.pkghawk.dev; img-src 'self' data:;" always;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # REST — 100 req/min per IP, burst 20
    location /latest {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location /health {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location /stats {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /mcp {
        return 308 /mcp/;
    }

    location /mcp/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    # SSE/WebSocket — 10 new connections/min per IP
    location /feed {
        limit_req zone=feed burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location /ws {
        limit_req zone=feed burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    # Status page — no rate limit
    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
