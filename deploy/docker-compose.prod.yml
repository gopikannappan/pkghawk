services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-pkghawk_redis_secret}

  app:
    image: ghcr.io/gopikannappan/pkghawk:latest
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-pkghawk_redis_secret}@redis:6379/0
      LOG_LEVEL: info
    env_file: .env.prod
    depends_on:
      - redis

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_secret}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-pkghawk_umami_app_secret}
    depends_on:
      - umami-db

  umami-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_secret}
    volumes:
      - umami-db-data:/var/lib/postgresql/data

volumes:
  redis-data:
  umami-db-data:
